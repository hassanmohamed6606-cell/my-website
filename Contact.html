<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Bakery - Contact</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h1>Get in Touch</h1>
        
        <form class="contact-form">
            <label>Your Name</label>
            <input type="text" placeholder="Enter your name" required>
            
            <label>Your Email</label>
            <input type="email" placeholder="Enter your email" required>
            
            <label>Your Message</label>
            <textarea rows="5" placeholder="Questions about our bread? Want to place a custom order? Let us know!" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
        
        <div style="text-align: center; margin-top: 40px;">
            <p><strong>📍 Visit Us:</strong> 12th Street, Eastleigh, Nairobi</p>
            <p><strong>📞 Call Us:</strong> (0719105156) </p>
            <p><strong>⏰ Hours:</strong> Monday - Sunday, 7AM - 10PM </p>
            <p><strong>✉️ Email:</strong> hello@naturesbakery.com</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Nature's Bakery. All rights reserved.</p>
    </footer>
</body>
</html>
